<!doctype html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>pdfcodes preview</title>
    <script>
      (function () {
        var stored = localStorage.getItem('theme')
        // Vite substitutes VITE_LIGHT_MODE below; when unset the raw token
        // remains and we fall back to the system color scheme. The comparison
        // string is concatenated so Vite doesn't substitute it too.
        var envLight = '%VITE_LIGHT_MODE%'
        var envUnset = envLight === '%' + 'VITE_LIGHT_MODE' + '%'
        var dark = stored === 'dark' || (stored !== 'light' && (envUnset
          ? window.matchMedia('(prefers-color-scheme: dark)').matches
          : envLight === 'false' || envLight === '0'))
        if (dark) document.documentElement.classList.add('dark')
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
